openapi: 3.1.0
info:
  title: Local PDF-to-CAD API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /v1/jobs:
    post:
      summary: Create processing job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './json-schemas/upload.request.json'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: './json-schemas/job.status.response.json'
  /v1/jobs/{jobId}:
    get:
      summary: Get job status
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: './json-schemas/job.status.response.json'
  /v1/rules/history:
    get:
      summary: Get rule history
      responses:
        '200':
          description: Rule history entries
          content:
            application/json:
              schema:
                $ref: './json-schemas/rule.history.response.json'
